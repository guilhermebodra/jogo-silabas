<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura das Sílabas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #FF6B9D 0%, #FFA500 50%, #FFD700 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: white;
            border-radius: 40px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .header {
            margin-bottom: 12px;
        }

        .title {
            font-size: 28px;
            color: #FF6B9D;
            margin-bottom: 6px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .score-box {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 20px;
            color: #333;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .image-container {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FFE5F0 0%, #FFF0E5 100%);
            border-radius: 25px;
            border: 3px solid #FF6B9D;
        }

        .animal-image {
            font-size: 80px;
            animation: bounce 0.8s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-25px) scale(1.1); }
        }

        .instruction {
            font-size: 16px;
            color: #333;
            font-weight: bold;
            line-height: 1.3;
            margin: 0;
        }

        .speak-button {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF1493 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.4);
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
        }

        .speak-button:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.6);
        }

        .speak-button:active {
            transform: scale(0.95);
        }

        .answer-area {
            background: linear-gradient(135deg, #E5F0FF 0%, #F0E5FF 100%);
            border: 4px dashed #6B7FFF;
            border-radius: 20px;
            padding: 12px;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }

        .answer-label {
            font-size: 14px;
            color: #6B7FFF;
            font-weight: bold;
            width: 100%;
            margin-bottom: 2px;
        }

        #answerContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .selected-syllable {
            background: linear-gradient(135deg, #6B7FFF 0%, #4B5FFF 100%);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #4B5FFF;
            box-shadow: 0 3px 8px rgba(107, 127, 255, 0.3);
            min-width: 55px;
        }

        .selected-syllable:hover {
            background: linear-gradient(135deg, #4B5FFF 0%, #2B3FFF 100%);
            transform: scale(1.1);
        }

        .options-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .options-label {
            font-size: 14px;
            color: #333;
            font-weight: bold;
            margin: 0;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .option-button {
            background: linear-gradient(135deg, #FFE066 0%, #FFC107 100%);
            border: 3px solid #FFA500;
            padding: 10px 14px;
            font-size: 20px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 8px rgba(255, 165, 0, 0.3);
            min-width: 60px;
        }

        .option-button:hover {
            background: linear-gradient(135deg, #FFC107 0%, #FF9800 100%);
            transform: scale(1.1);
            box-shadow: 0 6px 18px rgba(255, 165, 0, 0.5);
        }

        .option-button:active {
            transform: scale(0.95);
        }

        .option-button.used {
            opacity: 0.2;
            cursor: not-allowed;
            background: #CCC;
            border-color: #999;
        }

        .option-button.used:hover {
            background: #CCC;
            transform: scale(1);
            box-shadow: none;
        }

        .feedback {
            font-size: 20px;
            margin: 6px 0;
            min-height: 28px;
            font-weight: bold;
            line-height: 1.3;
        }

        .feedback.correct {
            color: #28a745;
            animation: popIn 0.5s;
        }

        .feedback.incorrect {
            color: #dc3545;
            animation: shake 0.5s;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }

        .button-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-button {
            padding: 10px 16px;
            font-size: 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
            min-width: 110px;
        }

        .action-button:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        }

        .action-button:active {
            transform: scale(0.95);
        }

        .check-button {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .clear-button {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF1493 100%);
            color: white;
        }

        .next-button {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            display: none;
            min-width: 200px;
        }

        .next-button.show {
            display: inline-block;
        }

        .celebration {
            font-size: 50px;
            animation: spin 0.6s;
            display: none;
        }

        .celebration.show {
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(0); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .reset-button {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            margin-top: 8px;
            min-width: 140px;
        }

        .game-over {
            font-size: 28px;
            color: #FF6B9D;
            font-weight: bold;
            padding: 30px;
            line-height: 1.6;
        }

        .game-over-emoji {
            font-size: 60px;
            margin: 20px 0;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .percentage {
            font-size: 48px;
            color: #FFD700;
            font-weight: 900;
            margin: 20px 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .title {
                font-size: 28px;
            }

            .animal-image {
                font-size: 100px;
            }

            .instruction {
                font-size: 18px;
            }

            .speak-button {
                font-size: 18px;
                padding: 14px 20px;
            }

            .option-button {
                font-size: 22px;
                padding: 12px 16px;
                min-width: 65px;
            }

            .selected-syllable {
                font-size: 24px;
                padding: 12px 16px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <audio id="backgroundMusic" style="display: none;"></audio>
    <div class="container">
        <div class="header">
            <div class="title">🎪 Aventura das Sílabas</div>
            <div class="score-box">⭐ <span id="score">0</span></div>
        </div>

        <div class="game-area">
            <div class="image-container">
                <div class="animal-image" id="animalImage">🐄</div>
            </div>

            <button class="speak-button" id="speakButton">🔊 Ouvir Palavra</button>

            <div class="answer-area">
                <div class="answer-label">✍️ Monte a palavra:</div>
                <div id="answerContainer"></div>
            </div>

            <div class="options-area">
                <div class="options-label">👇 Clique nas sílabas na ordem correta:</div>
                <div class="options" id="options"></div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="celebration" id="celebration">✨</div>

            <div class="button-group">
                <button class="action-button check-button" id="checkButton">✓ Verificar</button>
                <button class="action-button clear-button" id="clearButton">↻ Limpar</button>
                <button class="action-button next-button" id="nextButton">⏭️ Próxima →</button>
            </div>

            <button class="action-button reset-button" id="resetButton">🔄 Recomeçar</button>
        </div>
    </div>

    <script>
        // Dados do jogo
        const gameData = [
            {
                animal: '🐄',
                word: 'VACA',
                syllables: ['VA', 'CA'],
                extraSyllables: ['PA', 'MA', 'TA']
            },
            {
                animal: '🐷',
                word: 'PORCO',
                syllables: ['POR', 'CO'],
                extraSyllables: ['TOR', 'FOR', 'RO']
            },
            {
                animal: '🐔',
                word: 'GALINHA',
                syllables: ['GA', 'LI', 'NHA'],
                extraSyllables: ['BA', 'TA', 'RA']
            },
            {
                animal: '🐑',
                word: 'OVELHA',
                syllables: ['O', 'VE', 'LHA'],
                extraSyllables: ['PE', 'LE', 'TE']
            },
            {
                animal: '🐴',
                word: 'CAVALO',
                syllables: ['CA', 'VA', 'LO'],
                extraSyllables: ['LA', 'RA', 'SA']
            },
            {
                animal: '👑',
                word: 'COROA',
                syllables: ['CO', 'RO', 'A'],
                extraSyllables: ['TO', 'NO', 'BO']
            },
            {
                animal: '👸',
                word: 'PRINCESA',
                syllables: ['PRIN', 'CE', 'SA'],
                extraSyllables: ['TA', 'LA', 'DA']
            },
            {
                animal: '🏰',
                word: 'CASTELO',
                syllables: ['CAS', 'TE', 'LO'],
                extraSyllables: ['SO', 'NO', 'RO']
            },
            {
                animal: '🐔',
                word: 'FRANGO',
                syllables: ['FRAN', 'GO'],
                extraSyllables: ['FRA', 'RA', 'NO']
            },
            {
                animal: '🐰',
                word: 'COELHO',
                syllables: ['CO', 'E', 'LHO'],
                extraSyllables: ['RHO', 'NHO', 'THO']
            },
            {
                animal: '🦆',
                word: 'PATO',
                syllables: ['PA', 'TO'],
                extraSyllables: ['BA', 'DA', 'TA']
            },
            {
                animal: '🌾',
                word: 'TRIGO',
                syllables: ['TRI', 'GO'],
                extraSyllables: ['GRI', 'CO', 'RO']
            },
            {
                animal: '🌽',
                word: 'MILHO',
                syllables: ['MI', 'LHO'],
                extraSyllables: ['NHO', 'RHO', 'THO']
            },
            {
                animal: '🥛',
                word: 'LEITE',
                syllables: ['LEI', 'TE'],
                extraSyllables: ['REI', 'SE', 'PE']
            },
            {
                animal: '🧙‍♀️',
                word: 'MÁGICA',
                syllables: ['MÁ', 'GI', 'CA'],
                extraSyllables: ['TA', 'LA', 'DA']
            },
            {
                animal: '💎',
                word: 'JOIA',
                syllables: ['JO', 'IA'],
                extraSyllables: ['BO', 'DA', 'RA']
            }
        ];

        let currentIndex = 0;
        let score = 0;
        let selectedSyllables = [];
        let availableSyllables = [];
        let answered = false;

        const speakButton = document.getElementById('speakButton');
        const checkButton = document.getElementById('checkButton');
        const clearButton = document.getElementById('clearButton');
        const nextButton = document.getElementById('nextButton');
        const resetButton = document.getElementById('resetButton');
        const animalImage = document.getElementById('animalImage');
        const optionsContainer = document.getElementById('options');
        const answerContainer = document.getElementById('answerContainer');
        const feedbackDiv = document.getElementById('feedback');
        const scoreSpan = document.getElementById('score');
        const celebration = document.getElementById('celebration');

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function speakWord() {
            const current = gameData[currentIndex];
            const utterance = new SpeechSynthesisUtterance(current.word);
            utterance.lang = 'pt-BR';
            utterance.rate = 0.8;
            utterance.pitch = 1.0;
            speechSynthesis.speak(utterance);
        }

        function createOptions() {
            const current = gameData[currentIndex];
            selectedSyllables = [];
            
            availableSyllables = shuffleArray([...current.syllables, ...current.extraSyllables]);
            
            optionsContainer.innerHTML = '';
            availableSyllables.forEach((syllable, index) => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = syllable;
                button.onclick = () => selectSyllable(index, syllable);
                button.id = `syllable-${index}`;
                optionsContainer.appendChild(button);
            });
            
            updateAnswerDisplay();
        }

        function selectSyllable(index, syllable) {
            if (answered) return;
            
            const button = document.getElementById(`syllable-${index}`);
            if (button.classList.contains('used')) return;
            
            selectedSyllables.push({ index, syllable });
            button.classList.add('used');
            updateAnswerDisplay();
        }

        function updateAnswerDisplay() {
            answerContainer.innerHTML = '';
            selectedSyllables.forEach((item, pos) => {
                const div = document.createElement('div');
                div.className = 'selected-syllable';
                div.textContent = item.syllable;
                div.onclick = () => removeSyllable(pos);
                div.title = 'Clique para remover';
                answerContainer.appendChild(div);
            });
        }

        function removeSyllable(pos) {
            if (answered) return;
            
            const item = selectedSyllables[pos];
            const button = document.getElementById(`syllable-${item.index}`);
            button.classList.remove('used');
            selectedSyllables.splice(pos, 1);
            updateAnswerDisplay();
        }

        function clearAnswer() {
            if (answered) return;
            
            selectedSyllables.forEach(item => {
                const button = document.getElementById(`syllable-${item.index}`);
                button.classList.remove('used');
            });
            selectedSyllables = [];
            updateAnswerDisplay();
        }

        function checkAnswer() {
            if (answered) return;
            if (selectedSyllables.length === 0) {
                feedbackDiv.textContent = '⚠️ Selecione as sílabas!';
                feedbackDiv.className = 'feedback incorrect';
                return;
            }

            const current = gameData[currentIndex];
            const userAnswer = selectedSyllables.map(s => s.syllable).join('');
            const correctAnswer = current.syllables.join('');

            answered = true;

            if (userAnswer === correctAnswer) {
                feedbackDiv.textContent = '✓ Correto! Parabéns! 🎉';
                feedbackDiv.className = 'feedback correct';
                celebration.classList.add('show');
                score++;
                scoreSpan.textContent = score;
                playSuccessSound();
            } else {
                feedbackDiv.textContent = `✗ Errado! A resposta é: ${correctAnswer}`;
                feedbackDiv.className = 'feedback incorrect';
                playErrorSound();
            }

            checkButton.style.display = 'none';
            clearButton.style.display = 'none';
            nextButton.classList.add('show');
        }

        function nextQuestion() {
            currentIndex++;
            answered = false;

            if (currentIndex >= gameData.length) {
                showGameOver();
                return;
            }

            feedbackDiv.textContent = '';
            feedbackDiv.className = 'feedback';
            celebration.classList.remove('show');
            nextButton.classList.remove('show');
            checkButton.style.display = 'inline-block';
            clearButton.style.display = 'inline-block';

            const current = gameData[currentIndex];
            animalImage.textContent = current.animal;

            createOptions();
        }

        function showGameOver() {
            const percentage = Math.round((score / gameData.length) * 100);
            optionsContainer.innerHTML = `
                <div class="game-over">
                    <div class="game-over-emoji">🎊</div>
                    Parabéns! Você acertou<br><strong>${score} de ${gameData.length}</strong>
                    <div class="percentage">${percentage}%</div>
                    <div>Você foi incrível! 🌟</div>
                </div>
            `;
            speakButton.style.display = 'none';
            checkButton.style.display = 'none';
            clearButton.style.display = 'none';
            nextButton.classList.remove('show');
            feedbackDiv.textContent = '';
        }

        function resetGame() {
            currentIndex = 0;
            score = 0;
            answered = false;
            scoreSpan.textContent = score;
            feedbackDiv.textContent = '';
            feedbackDiv.className = 'feedback';
            celebration.classList.remove('show');
            nextButton.classList.remove('show');
            speakButton.style.display = 'inline-block';
            checkButton.style.display = 'inline-block';
            clearButton.style.display = 'inline-block';

            const current = gameData[currentIndex];
            animalImage.textContent = current.animal;

            createOptions();
        }

        // Gerar música de fundo proceduralmente
        function generateBackgroundMusic() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const bufferLength = audioContext.sampleRate * 30; // 30 segundos
            const buffer = audioContext.createBuffer(1, bufferLength, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            
            // Sequência de notas alegres (escala maior)
            const notes = [262, 294, 330, 349, 392, 440, 494, 523]; // Dó, Ré, Mi, Fá, Sol, Lá, Si, Dó
            let noteIndex = 0;
            let sampleIndex = 0;
            const noteDuration = audioContext.sampleRate * 0.8; // 0.8 segundos por nota
            
            while (sampleIndex < bufferLength) {
                const freq = notes[noteIndex % notes.length];
                const samplesInNote = Math.min(noteDuration, bufferLength - sampleIndex);
                
                for (let i = 0; i < samplesInNote; i++) {
                    const t = i / audioContext.sampleRate;
                    // Envelope ADSR simples
                    let envelope = 1;
                    if (t < 0.05) {
                        envelope = t / 0.05; // Attack
                    } else if (t > samplesInNote / audioContext.sampleRate - 0.1) {
                        envelope = Math.max(0, (samplesInNote / audioContext.sampleRate - t) / 0.1); // Release
                    }
                    data[sampleIndex + i] = Math.sin(2 * Math.PI * freq * t) * 0.2 * envelope;
                }
                
                sampleIndex += samplesInNote;
                noteIndex++;
            }
            
            return buffer;
        }
        
        let backgroundMusicSource = null;
        let backgroundAudioContext = null;
        
        function playBackgroundMusic() {
            try {
                if (backgroundMusicSource) {
                    backgroundMusicSource.stop();
                }
                
                backgroundAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                const buffer = generateBackgroundMusic();
                backgroundMusicSource = backgroundAudioContext.createBufferSource();
                const gainNode = backgroundAudioContext.createGain();
                
                backgroundMusicSource.buffer = buffer;
                gainNode.gain.value = 0.4; // Volume moderado
                
                backgroundMusicSource.connect(gainNode);
                gainNode.connect(backgroundAudioContext.destination);
                
                backgroundMusicSource.loop = true;
                backgroundMusicSource.start(0);
            } catch (e) {
                console.log('Música de fundo não disponível:', e);
            }
        }
        
        // Funções de som
        function playSuccessSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioContext.currentTime;
            
            // Notas musicais alegres: Do, Mi, Sol, Do (oitava acima)
            const notes = [262, 330, 392, 523];
            
            notes.forEach((freq, i) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = freq;
                osc.type = 'sine';
                
                gain.gain.setValueAtTime(0.3, now + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.1);
                
                osc.start(now + i * 0.15);
                osc.stop(now + i * 0.15 + 0.1);
            });
        }
        
        function playErrorSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioContext.currentTime;
            
            // Som de erro: duas notas baixas
            const notes = [150, 120];
            
            notes.forEach((freq, i) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = freq;
                osc.type = 'square';
                
                gain.gain.setValueAtTime(0.2, now + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.15);
                
                osc.start(now + i * 0.1);
                osc.stop(now + i * 0.1 + 0.15);
            });
        }

        let musicStarted = false;
        
        function startMusicOnFirstInteraction() {
            if (!musicStarted) {
                playBackgroundMusic();
                musicStarted = true;
                document.removeEventListener('click', startMusicOnFirstInteraction);
            }
        }
        
        speakButton.addEventListener('click', speakWord);
        checkButton.addEventListener('click', checkAnswer);
        clearButton.addEventListener('click', clearAnswer);
        nextButton.addEventListener('click', nextQuestion);
        resetButton.addEventListener('click', resetGame);

        // Inicializar o jogo
        resetGame();
        
        // Iniciar música de fundo no primeiro clique
        document.addEventListener('click', startMusicOnFirstInteraction);
    </script>
</body>
</html>
